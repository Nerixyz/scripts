name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install and Build
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
          zensical build
